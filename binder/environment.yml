# MyBinder / repo2docker environment (Docker-based)
#
# This file is read by MyBinder and repo2docker to create a Docker container.
# It is SEPARATE from the root environment.yml (which configures notebook.link).
#
# This minimal conda environment provides Python 3.12, pip, and Node.js 22.
# All project dependencies are installed from pyproject.toml by postBuild using uv.

name: moderation
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - nodejs=22 # Required by MyST for documentation
